<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c2541" />
    <link rel="manifest" href="/sk-tracking/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/sk-tracking/icons/icon-192.png" />
    <title>Skull King Scorekeeper</title>
    <script>
      // GitHub Pages SPA redirect fix
      (function () {
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
